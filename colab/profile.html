<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Colab — Profile</title>
  <link href="https://fonts.googleapis.com/css2?family=Cabinet+Grotesk:wght@700;900&family=Satoshi:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    :root { --coral: #FF4D6D; --yellow: #FFD60A; --cyan: #00F5D4; --purple: #9B5DE5; --bg: #0A0A0F; --surface: #13131A; --surface2: #1C1C26; --border: rgba(255,255,255,0.07); --text: #F0F0FF; --muted: #7070A0; }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Satoshi', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }
    .bg-blobs { position: fixed; inset: 0; z-index: 0; overflow: hidden; pointer-events: none; }
    .blob { position: absolute; border-radius: 50%; filter: blur(80px); opacity: 0.1; animation: blobFloat 8s ease-in-out infinite; }
    .blob-1 { width: 400px; height: 400px; background: var(--purple); top: -100px; right: -100px; }
    .blob-2 { width: 300px; height: 300px; background: var(--cyan); bottom: 10%; left: 0; animation-delay: 3s; }
    @keyframes blobFloat { 0%,100% { transform:translate(0,0); } 50% { transform:translate(20px,-20px); } }
    nav { position: fixed; top: 0; left: 0; right: 0; z-index: 100; padding: 20px 60px; display: flex; justify-content: space-between; align-items: center; backdrop-filter: blur(20px); background: rgba(10,10,15,0.7); border-bottom: 1px solid var(--border); }
    .logo { font-family: 'Cabinet Grotesk', sans-serif; font-size: 28px; font-weight: 900; background: linear-gradient(135deg, var(--coral), var(--yellow), var(--cyan)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; text-decoration: none; }
    .btn-outline { padding: 10px 22px; border: 1.5px solid var(--border); border-radius: 100px; background: transparent; color: var(--text); font-family: 'Satoshi', sans-serif; font-size: 14px; font-weight: 600; text-decoration: none; transition: all 0.2s; }
    .btn-outline:hover { border-color: var(--cyan); color: var(--cyan); }
    .page { position: relative; z-index: 1; max-width: 600px; margin: 0 auto; padding: 120px 40px 80px; }
    .tag { font-size: 12px; font-weight: 700; text-transform: uppercase; letter-spacing: 2px; color: var(--coral); margin-bottom: 16px; }
    h1 { font-family: 'Cabinet Grotesk', sans-serif; font-size: 48px; font-weight: 900; letter-spacing: -2px; margin-bottom: 40px; }
    .card { background: var(--surface); border: 1px solid var(--border); border-radius: 24px; padding: 36px; margin-bottom: 20px; position: relative; overflow: hidden; }
    .card::before { content: ""; position: absolute; top: 0; left: 0; right: 0; height: 2px; background: linear-gradient(90deg, var(--coral), var(--yellow), var(--cyan), var(--purple)); }

    /* Profile pic */
    .pic-section { display: flex; align-items: center; gap: 24px; margin-bottom: 28px; }
    .pic-wrapper { position: relative; cursor: pointer; }
    .profile-pic { width: 90px; height: 90px; border-radius: 20px; object-fit: cover; background: linear-gradient(135deg, var(--coral), var(--purple)); display: flex; align-items: center; justify-content: center; font-size: 36px; border: 2px solid var(--border); }
    .pic-overlay { position: absolute; inset: 0; background: rgba(0,0,0,0.6); border-radius: 20px; display: flex; align-items: center; justify-content: center; opacity: 0; transition: opacity 0.2s; font-size: 22px; }
    .pic-wrapper:hover .pic-overlay { opacity: 1; }
    .pic-info h3 { font-family: 'Cabinet Grotesk', sans-serif; font-size: 22px; font-weight: 900; margin-bottom: 4px; }
    .pic-info p { font-size: 13px; color: var(--muted); }
    .pic-btn { margin-top: 10px; padding: 8px 16px; background: rgba(255,255,255,0.06); border: 1.5px solid var(--border); border-radius: 100px; color: var(--text); font-size: 12px; font-weight: 600; cursor: pointer; font-family: 'Satoshi', sans-serif; transition: all 0.2s; }
    .pic-btn:hover { border-color: var(--coral); color: var(--coral); }
    #picInput { display: none; }

    /* Fields */
    .field { margin-bottom: 18px; }
    label { display: block; font-size: 12px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.5px; color: var(--muted); margin-bottom: 8px; }
    input { width: 100%; background: var(--surface2); border: 1.5px solid var(--border); border-radius: 12px; padding: 13px 16px; font-family: 'Satoshi', sans-serif; font-size: 15px; color: var(--text); outline: none; transition: border-color 0.2s; }
    input:focus { border-color: var(--coral); }
    input::placeholder { color: var(--muted); }
    input:disabled { opacity: 0.5; cursor: not-allowed; }

    .plan-badge { display: inline-flex; align-items: center; gap: 6px; padding: 6px 14px; border-radius: 100px; font-size: 13px; font-weight: 700; margin-bottom: 20px; }
    .badge-free { background: rgba(255,255,255,0.06); color: var(--muted); border: 1px solid var(--border); }
    .badge-pro { background: linear-gradient(135deg, var(--coral), var(--purple)); color: white; }

    .save-btn { width: 100%; padding: 14px; background: linear-gradient(135deg, var(--coral), var(--purple)); border: none; border-radius: 12px; color: white; font-family: 'Cabinet Grotesk', sans-serif; font-size: 16px; font-weight: 800; cursor: pointer; transition: all 0.2s; }
    .save-btn:hover { transform: translateY(-2px); box-shadow: 0 12px 40px rgba(255,77,109,0.4); }
    .logout-btn { width: 100%; padding: 14px; background: transparent; border: 1.5px solid var(--border); border-radius: 12px; color: var(--muted); font-family: 'Satoshi', sans-serif; font-size: 15px; font-weight: 600; cursor: pointer; transition: all 0.2s; margin-top: 10px; }
    .logout-btn:hover { border-color: var(--coral); color: var(--coral); }
    .toast { position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%) translateY(80px); background: var(--surface); border: 1px solid var(--border); border-radius: 100px; padding: 12px 24px; font-size: 14px; font-weight: 600; transition: transform 0.3s; z-index: 999; }
    .toast.show { transform: translateX(-50%) translateY(0); }
    footer { position: relative; z-index: 1; border-top: 1px solid var(--border); padding: 32px 60px; display: flex; justify-content: space-between; align-items: center; }
    .footer-logo { font-family: 'Cabinet Grotesk', sans-serif; font-size: 20px; font-weight: 900; background: linear-gradient(135deg, var(--coral), var(--cyan)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
    .footer-copy { font-size: 13px; color: var(--muted); }
    @media (max-width: 768px) { nav { padding: 16px 24px; } .page { padding: 100px 20px 60px; } footer { flex-direction: column; gap: 12px; padding: 24px; text-align: center; } }
  </style>
</head>
<body>
  <div class="bg-blobs"><div class="blob blob-1"></div><div class="blob blob-2"></div></div>
  <nav>
    <a href="index.html" class="logo">Colab</a>
    <a href="chat.html" class="btn-outline">← Back to Chat</a>
  </nav>

  <div class="page">
    <div class="tag">Account</div>
    <h1>Your Profile</h1>

    <div class="card">
      <div class="pic-section">
        <div class="pic-wrapper" onclick="document.getElementById('picInput').click()">
          <div class="profile-pic" id="profilePicDisplay">😊</div>
          <div class="pic-overlay">📷</div>
        </div>
        <div class="pic-info">
          <h3 id="displayName">Loading...</h3>
          <p id="displayEmail">...</p>
          <button class="pic-btn" onclick="document.getElementById('picInput').click()">📷 Change photo</button>
        </div>
      </div>
      <input type="file" id="picInput" accept="image/*">

      <div id="planBadge" class="plan-badge badge-free">🆓 Free Plan</div>

      <div class="field"><label>Full Name</label><input type="text" id="nameInput" placeholder="Your name"></div>
      <div class="field"><label>Email</label><input type="email" id="emailInput" placeholder="you@example.com" disabled></div>
      <div class="field"><label>Cohere API Key</label><input type="password" id="cohereInput" placeholder="Your Cohere API key"></div>
      <div class="field"><label>Groq API Key (Pro)</label><input type="password" id="groqInput" placeholder="Your Groq API key (for Pro plan)"></div>

      <button class="save-btn" onclick="saveProfile()">Save changes</button>
      <button class="logout-btn" onclick="logout()">Sign out</button>
    </div>
  </div>

  <div class="toast" id="toast">✅ Saved!</div>

  <footer>
    <div class="footer-logo">Colab</div>
    <div class="footer-copy">© 2026 Colab AI by <strong>Arjun KL</strong>. All rights reserved.</div>
  </footer>

  <script type="module">
    import { logSearch, saveUserProfile, getUserProfile, uploadProfilePic } from './firebase.js';

    const user = JSON.parse(localStorage.getItem('colab_user') || '{}');
    if (!user.email) { window.location.href = 'login.html'; }

    // Load UI
    document.getElementById('displayName').textContent = user.name || 'You';
    document.getElementById('displayEmail').textContent = user.email || '';
    document.getElementById('nameInput').value = user.name || '';
    document.getElementById('emailInput').value = user.email || '';
    document.getElementById('cohereInput').value = localStorage.getItem('colab_api_key') || '';
    document.getElementById('groqInput').value = localStorage.getItem('colab_groq_key') || '';

    // Plan badge
    if (localStorage.getItem('colab_plan') === 'pro') {
      document.getElementById('planBadge').className = 'plan-badge badge-pro';
      document.getElementById('planBadge').textContent = '⚡ Pro Plan';
    }

    // Load profile pic from Firebase
    if (user.email) {
      getUserProfile(user.email).then(profile => {
        if (profile?.profilePic) {
          const img = document.createElement('img');
          img.src = profile.profilePic;
          img.style.cssText = 'width:90px;height:90px;border-radius:20px;object-fit:cover;';
          document.getElementById('profilePicDisplay').replaceWith(img);
          img.id = 'profilePicDisplay';
        }
      });
    }

    // Profile pic upload
    document.getElementById('picInput').addEventListener('change', async (e) => {
      const file = e.target.files[0];
      if (!file || !user.email) return;
      showToast('⏳ Uploading...');
      const url = await uploadProfilePic(user.email, file);
      if (url) {
        const img = document.createElement('img');
        img.src = url;
        img.style.cssText = 'width:90px;height:90px;border-radius:20px;object-fit:cover;';
        document.getElementById('profilePicDisplay').replaceWith(img);
        img.id = 'profilePicDisplay';
        user.picture = url;
        localStorage.setItem('colab_user', JSON.stringify(user));
        showToast('✅ Photo updated!');
      }
    });

    // Save profile
    window.saveProfile = async function() {
      const name = document.getElementById('nameInput').value.trim();
      const cohereKey = document.getElementById('cohereInput').value.trim();
      const groqKey = document.getElementById('groqInput').value.trim();

      user.name = name;
      localStorage.setItem('colab_user', JSON.stringify(user));
      if (cohereKey) localStorage.setItem('colab_api_key', cohereKey);
      if (groqKey) { localStorage.setItem('colab_groq_key', groqKey); localStorage.setItem('colab_plan', 'pro'); }

      await saveUserProfile(user.email, { name, email: user.email, updatedAt: new Date().toISOString() });
      document.getElementById('displayName').textContent = name;
      showToast('✅ Profile saved!');
    }

    window.logout = function() {
      localStorage.removeItem('colab_user');
      window.location.href = 'login.html';
    }

    function showToast(msg) {
      const t = document.getElementById('toast');
      t.textContent = msg;
      t.classList.add('show');
      setTimeout(() => t.classList.remove('show'), 2500);
    }
  </script>
</body>
</html>
